# FinSight — Main Configuration
# All parameters read from here; nothing is hardcoded in src/

project:
  name: FinSight
  company: Microsoft Corporation
  ticker: MSFT
  seed: 42

paths:
  raw_data: data/raw
  processed_data: data/processed
  metadata: data/metadata
  chroma_db: indexes/chroma
  bm25_index: indexes/bm25/bm25.pkl
  bm25_corpus: indexes/bm25/corpus.pkl
  retrieval_logs: indexes/retrieval_logs

embeddings:
  # Base model (default). Swap to fine-tuned model after running finetune_embedder.sh:
  #   model: models/finsight-embedder
  model: sentence-transformers/all-mpnet-base-v2
  batch_size: 32
  normalize: true

retrieval:
  mode: advanced            # "baseline" = dense-only (no rerank), "advanced" = hybrid RRF + reranker
  baseline_top_k: 5         # top-k for baseline mode (dense-only, no reranker)
  dense_top_k: 25
  sparse_top_k: 25
  rerank_top_k: 20
  final_context_k: 10
  period_guaranteed_slots: 3   # guarantee >=N context slots from detected fiscal period
  rrf_k: 60              # RRF constant — do not change without reason
  weak_evidence_threshold: -3.0  # cross-encoder logits range ~-10 to +10; scores above -3 indicate relevance

reranker:
  # Base model (default). Swap to fine-tuned model after running finetune_reranker.sh:
  #   model: models/finsight-reranker
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  max_length: 512

generation:
  backend: openai          # vLLM speaks the OpenAI API
  model: qwen2.5-14b
  base_url: http://localhost:8000/v1
  api_key: dummy
  temperature: 0.0
  max_tokens: 512
  max_chunk_chars: 1800
  timeout_seconds: 120

guardrails:
  out_of_scope_check: true
  require_citations: true
  weak_evidence_warning: true
  allowed_topics:
    # Company identifiers
    - microsoft
    - msft
    # Products & services
    - azure
    - cloud
    - office
    - teams
    - windows
    - surface
    - xbox
    - linkedin
    - github
    - copilot
    - bing
    - dynamics
    - nuance
    - activision
    # Financial metrics
    - revenue
    - ebitda
    - operating income
    - net income
    - gross margin
    - profit
    - loss
    - earnings
    - eps
    - dividend
    - cash flow
    - cash
    - debt
    - equity
    - margin
    - tax
    - expense
    - cost
    - asset
    - liabil
    - balance sheet
    - income statement
    # Business segments & topics
    - segment
    - productivity
    - intelligent cloud
    - personal computing
    - more personal
    - strategy
    - business
    - competition
    - competitive
    - growth
    - market
    - customer
    - partner
    - employee
    - headcount
    - research
    - development
    - acquisition
    # Filing types & periods
    - 10-k
    - 10-q
    - 10k
    - 10q
    - annual report
    - quarterly report
    - filing
    - fiscal
    - fy20
    - fy19
    - quarter
    - quarterly
    - annual
    # Disclosure topics
    - risk
    - factor
    - disclosed
    - disclosure
    - reported
    - regulatory
    - regulation
    - compliance
    - litigation
    - legal
    - outlook
    - guidance
    - forecast
    - cybersecurity
    - ai
    - artificial intelligence

chroma:
  collection_name: msft_filings
  distance_function: cosine

# Document registry
# Microsoft fiscal year ends June 30. Q1=Jul-Sep, Q2=Oct-Dec, Q3=Jan-Mar, Q4=Apr-Jun
# Download PDFs from SEC EDGAR: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=789019
# or Microsoft IR: https://investor.microsoft.com/sec-filings
# Place downloaded PDFs in data/raw/ using the filenames below.
documents:
